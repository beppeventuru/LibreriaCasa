name: Prepara Libreria Casa per GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v6
      - name: Pubblica con tentativi automatici
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp -a public/. "$publish_dir/"
          touch "$publish_dir/.nojekyll"
          cd "$publish_dir"
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          publish_attempt() {
            local attempt="$1"
            git commit --allow-empty -m "Pubblica ${GITHUB_SHA} - tentativo ${attempt}" >&2
            git push --force \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              gh-pages >&2
            git rev-parse HEAD
          }

          wait_for_pages() {
            local published_sha="$1"
            local result=""
            local run_status=""
            local conclusion=""

            for check in $(seq 1 12); do
              result="$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow pages-build-deployment \
                --limit 20 \
                --json headSha,status,conclusion \
                --jq ".[] | select(.headSha == \"${published_sha}\") | [.status, .conclusion] | @tsv" \
                | head -n 1)"

              if [ -n "$result" ]; then
                IFS=$'\t' read -r run_status conclusion <<< "$result"
                if [ "$run_status" = "completed" ]; then
                  [ "$conclusion" = "success" ]
                  return
                fi
              fi
              sleep 3
            done
            return 1
          }

          for attempt in 1 2 3; do
            published_sha="$(publish_attempt "$attempt")"
            if wait_for_pages "$published_sha"; then
              echo "GitHub Pages pubblicato al tentativo ${attempt}."
              exit 0
            fi
            echo "Tentativo ${attempt} non riuscito."
          done

          echo "GitHub Pages non è stato pubblicato dopo tre tentativi."
          exit 1
