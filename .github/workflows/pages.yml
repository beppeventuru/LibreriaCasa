name: Pubblica Libreria Casa

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v4
      - name: Configura Pages
        uses: actions/configure-pages@v5
      - name: Prepara i file del sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
